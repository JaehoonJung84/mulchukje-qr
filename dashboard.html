<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>장흥 물축제 출석 현황</title>
<style>
  :root{ --bg:#0b1220; --card:#141d2e; --line:#2a3750; --txt:#e8eef7; --sub:#8ca0bd;
         --ok:#22c55e; --track:#243149; --brand:#3b82f6; --warn:#f59e0b; }
  @media (prefers-color-scheme:light){
    :root{ --bg:#f4f6fb; --card:#fff; --line:#e2e8f0; --txt:#0f172a; --sub:#64748b; --track:#e8edf5; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
  header{position:sticky;top:0;z-index:5;background:var(--card);border-bottom:1px solid var(--line);
    padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  header h1{font-size:18px;margin:0;font-weight:800}
  .updated{color:var(--sub);font-size:12px}
  .grow{flex:1}
  .wrap{max-width:1000px;margin:0 auto;padding:18px}
  .hero{display:flex;align-items:baseline;gap:14px;margin:6px 0 20px;flex-wrap:wrap}
  .hero .big{font-size:52px;font-weight:800;line-height:1}
  .hero .of{font-size:20px;color:var(--sub)}
  .hero .pct{font-size:20px;color:var(--ok);font-weight:700}
  .bar{height:14px;border-radius:999px;background:var(--track);overflow:hidden;margin:10px 0 24px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);width:0;transition:width .5s}
  h2{font-size:14px;color:var(--sub);text-transform:none;margin:22px 0 10px;font-weight:700;letter-spacing:.02em}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .c{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .c .h{display:flex;justify-content:space-between;align-items:baseline}
  .c .name{font-weight:700;font-size:15px}
  .c .num{font-size:13px;color:var(--sub)}
  .c .num b{color:var(--txt);font-size:16px}
  .mini{height:8px;border-radius:999px;background:var(--track);overflow:hidden;margin-top:10px}
  .mini > i{display:block;height:100%;background:var(--ok);width:0;transition:width .5s}
  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:14px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--sub);font-weight:600;font-size:12px;position:sticky;top:0;background:var(--card)}
  .absbox{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;max-height:60vh;overflow-y:auto}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;background:var(--track);font-size:12px}
  .muted{color:var(--sub)}
  input,select{font:inherit;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--txt)}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:9px;padding:9px 14px;font-weight:600}
  .setup{max-width:560px;margin:60px auto;padding:24px;background:var(--card);border:1px solid var(--line);border-radius:16px}
  .setup label{display:block;color:var(--sub);font-size:13px;margin:12px 0 6px}
  .setup input{width:100%}
  .err{color:#ef4444;font-size:13px;margin-top:8px}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
</style>
</head>
<body>

<div id="setup" class="setup" style="display:none">
  <h1 style="margin:0 0 6px">출석 현황판 설정</h1>
  <p class="muted" style="font-size:13px;margin:0">Apps Script 배포 URL을 입력하세요.</p>
  <label>서버 주소 (.../exec)</label>
  <input id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" autocapitalize="off" spellcheck="false">
  <div id="setupErr" class="err"></div>
  <div style="height:16px"></div>
  <button id="saveUrl" style="background:var(--brand);color:#fff;border:none">저장</button>
</div>

<div id="main" style="display:none">
  <header>
    <h1>🌊 장흥 물축제 출석 현황</h1>
    <div class="grow"></div>
    <div class="toolbar">
      <label class="muted" style="font-size:12px"><input type="checkbox" id="auto" checked> 자동새로고침</label>
      <button id="refresh">새로고침</button>
      <button id="cfg" title="설정">⚙</button>
    </div>
    <div style="flex-basis:100%"></div>
    <span class="updated" id="updated"></span>
  </header>

  <div class="wrap">
    <div class="hero">
      <span class="big"><span id="present">0</span></span>
      <span class="of">/ <span id="total">0</span> 명</span>
      <span class="pct" id="pct">0%</span>
      <span class="muted" id="absCount"></span>
    </div>
    <div class="bar"><i id="heroBar"></i></div>

    <h2>차량별 출석</h2>
    <div class="cards" id="busCards"></div>

    <h2>국가별 출석</h2>
    <div class="cards" id="ctryCards"></div>

    <h2 style="display:flex;align-items:center;gap:10px">미출석자 <span class="pill" id="absPill">0</span>
      <span class="grow"></span>
      <input id="absSearch" placeholder="이름/학번 검색" style="font-size:13px">
    </h2>
    <div class="absbox">
      <table>
        <thead><tr><th>이름</th><th>학번</th><th>국가</th><th>차량</th><th>전화</th></tr></thead>
        <tbody id="absBody"></tbody>
      </table>
    </div>
    <p class="muted" style="font-size:12px;margin-top:14px">
      데이터는 구글시트 <b>출석</b> 탭에 실시간 누적됩니다. 이 화면은 30초마다 갱신됩니다.</p>
  </div>
</div>

<script>
"use strict";
/* 관리자 설정: 여기에 Apps Script 배포 URL(.../exec)을 넣으면 설정화면 없이 바로 현황이 뜹니다.
   scan.html 의 HARDCODED_GAS 와 같은 주소를 넣으면 됩니다. 비우면 입력화면이 나옵니다. */
var HARDCODED_GAS = "";
var LS='ws_gas';
var $=function(id){return document.getElementById(id);};
var GAS=HARDCODED_GAS||localStorage.getItem(LS)||'';
var allAbsent=[];

function jsonp(params){
  return new Promise(function(res,rej){
    var cb='__dcb_'+Date.now()+'_'+Math.floor(performance.now());
    var s=document.createElement('script');
    var to=setTimeout(function(){cleanup();rej(new Error('시간초과'));},12000);
    function cleanup(){clearTimeout(to);delete window[cb];s.remove();}
    window[cb]=function(d){cleanup();res(d);};
    var q=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
    s.src=GAS+(GAS.indexOf('?')>-1?'&':'?')+q+'&callback='+cb;
    s.onerror=function(){cleanup();rej(new Error('네트워크 오류'));};
    document.body.appendChild(s);
  });
}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}

function card(name,d){
  var pct=d.total? Math.round(d.present/d.total*100):0;
  return '<div class="c"><div class="h"><span class="name">'+esc(name)+'</span>'
    +'<span class="num"><b>'+d.present+'</b>/'+d.total+'</span></div>'
    +'<div class="mini"><i style="width:'+pct+'%"></i></div></div>';
}

function render(data){
  $('total').textContent=data.total;
  $('present').textContent=data.presentCount;
  var pct=data.total?Math.round(data.presentCount/data.total*100):0;
  $('pct').textContent=pct+'%';
  $('heroBar').style.width=pct+'%';
  $('absCount').textContent='· 미출석 '+(data.total-data.presentCount)+'명';
  $('updated').textContent='업데이트 '+data.updated;

  var busOrder=['1호차','2호차','3호차','4호차','5호차'];
  var bk=Object.keys(data.byBus).sort(function(a,b){
    var ia=busOrder.indexOf(a),ib=busOrder.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);});
  $('busCards').innerHTML=bk.map(function(k){return card(k,data.byBus[k]);}).join('');

  var ck=Object.keys(data.byCountry).sort(function(a,b){return data.byCountry[b].total-data.byCountry[a].total;});
  $('ctryCards').innerHTML=ck.map(function(k){return card(k,data.byCountry[k]);}).join('');

  allAbsent=data.absent||[];
  $('absPill').textContent=allAbsent.length;
  renderAbsent();
}
function renderAbsent(){
  var q=($('absSearch').value||'').trim().toLowerCase();
  var rows=allAbsent.filter(function(a){
    if(!q)return true;
    return String(a.이름).toLowerCase().indexOf(q)>-1||String(a.학번).indexOf(q)>-1;
  });
  $('absBody').innerHTML=rows.map(function(a){
    return '<tr><td>'+esc(a.이름)+'</td><td>'+esc(a.학번)+'</td><td>'+esc(a.국가)
      +'</td><td>'+esc(a.차량번호)+'</td><td>'+esc(a.전화번호)+'</td></tr>';
  }).join('')||'<tr><td colspan="5" class="muted">전원 출석했거나 결과가 없습니다.</td></tr>';
}
$('absSearch').addEventListener('input',renderAbsent);

var timer;
function load(){
  $('updated').textContent='불러오는 중…';
  jsonp({action:'dashboard'}).then(render).catch(function(e){
    $('updated').textContent='오류: '+e.message;
  });
}
function schedule(){
  clearInterval(timer);
  if($('auto').checked) timer=setInterval(load,30000);
}
$('refresh').onclick=load;
$('auto').onchange=schedule;
$('cfg').onclick=function(){ $('gasUrl').value=GAS; $('main').style.display='none'; $('setup').style.display='block'; };

$('saveUrl').onclick=function(){
  var u=$('gasUrl').value.trim();
  if(!(/^https:\/\/.+/.test(u) ||
       /^http:\/\/(localhost|127\.0\.0\.1|192\.168\.\d+\.\d+)(:\d+)?\//.test(u))){
    $('setupErr').textContent='올바른 서버 주소(https://...)를 입력하세요.'; return; }
  GAS=u; localStorage.setItem(LS,u);
  $('setup').style.display='none'; $('main').style.display='block'; load(); schedule();
};

(function init(){
  if(GAS){ $('main').style.display='block'; load(); schedule(); }
  else   { $('setup').style.display='block'; }
})();
</script>
</body>
</html>
